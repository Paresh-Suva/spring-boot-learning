spring.application.name=jpa-relationships-demo

# THIS ENABLES THE H2 DATABASE WEB CONSOLE.
spring.h2.console.enabled=true

# THIS TELLS SPRING TO USE AN IN-MEMORY H2 DATABASE.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# THIS MAKES HIBERNATE CREATE TABLES AUTOMATICALLY.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
